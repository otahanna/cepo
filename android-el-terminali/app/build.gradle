plugins {
    id 'com.android.application'
}

android {
    namespace 'com.cepo.elterminali'
    compileSdk 35

    defaultConfig {
        applicationId 'com.cepo.elterminali'
        minSdk 24
        targetSdk 35
        versionCode 1
        versionName '1.0.0'
    }

    buildTypes {
        debug {
            debuggable true
        }
        release {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}
