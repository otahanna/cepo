name: Build CEPO El Terminali APK

on:
  push:
    branches:
      - el-terminali-apk-v1
    paths:
      - 'el-terminali-apk/**'
  pull_request:
    branches:
      - main
    paths:
      - 'el-terminali-apk/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Build debug APK
        working-directory: el-terminali-apk
        run: gradle :app:assembleDebug --no-daemon --stacktrace

      - name: Prepare APK name
        run: |
          cp el-terminali-apk/app/build/outputs/apk/debug/app-debug.apk CEPO_EL_TERMINALI_V1.apk

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: CEPO_EL_TERMINALI_V1
          path: CEPO_EL_TERMINALI_V1.apk
          if-no-files-found: error
          retention-days: 30

      - name: Publish APK release
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="cepo-el-terminali-v1.0.0-20260717"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release delete "$TAG" -y --cleanup-tag
          fi
          gh release create "$TAG" CEPO_EL_TERMINALI_V1.apk \
            --title "CEPO El Terminali Android V1" \
            --notes "Tek APK: HALK/LIMON profil seçimi, cihaz bazlı sabit şube, Cloudflare Tunnel bağlantısı. HALK 8127 / LIMON 8128 sunucu yapısıyla uyumludur."
